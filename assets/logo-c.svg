<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" role="img">
  <title>Waypoint — logo concept C (concentric rings)</title>
  <!-- Cream circle background with subtle navy border -->
  <circle cx="54" cy="54" r="54" fill="#FBF6EE" stroke="#22395C" stroke-opacity="0.12"/>
  <!-- Outer navy ring -->
  <circle cx="54" cy="54" r="34" fill="none" stroke="#22395C" stroke-width="3"/>
  <!-- Middle orange ring -->
  <circle cx="54" cy="54" r="22" fill="none" stroke="#FF6B4A" stroke-width="3"/>
  <!-- Centre navy dot -->
  <circle cx="54" cy="54" r="9"  fill="#22395C"/>
</svg>
