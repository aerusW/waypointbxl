name: Update events from Démosphère

on:
  schedule:
    - cron: "17 5 * * *" # daily at 05:17 UTC
  workflow_dispatch: {} # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch feed and regenerate data/auto-events.json
        run: node scripts/update-events.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auto-events.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-update events from Démosphère feed"
            git push
          fi
